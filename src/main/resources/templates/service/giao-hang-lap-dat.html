<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{info-page :: layout('Giao hàng & Lắp đặt', 'Dịch vụ giao hàng và lắp đặt trọn gói, giúp bạn nhận sản phẩm đúng hạn và sẵn sàng sử dụng ngay.', ~{::main})}">
<body>
<main>
  <section class="section">
    <h2>Giao hàng an toàn</h2>
    <p>Sản phẩm được đóng gói kỹ lưỡng, hạn chế va đập trong quá trình vận chuyển.</p>
  </section>
  <section class="section">
    <h2>Lắp đặt chuyên nghiệp</h2>
    <p>Đội ngũ lắp đặt có kinh nghiệm sẽ hoàn thiện sản phẩm ngay tại nhà bạn.</p>
  </section>
  <section class="section">
    <h2>Hướng dẫn bảo quản</h2>
    <p>Chúng tôi hướng dẫn cách sử dụng và bảo quản để nội thất giữ được độ bền lâu dài.</p>
  </section>
</main>
</body>
</html>
