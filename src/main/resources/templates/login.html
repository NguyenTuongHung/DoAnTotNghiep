<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — Mộc & Vàng</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#F5F0E8;--walnut:#3A2A1A;--gold:#B8935A;--off-white:#FAF7F2;--muted:#9A8E80;--border-subtle:rgba(184,147,90,0.18);--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif;}
    body{font-family:var(--font-sans);background:var(--off-white);color:var(--walnut);line-height:1.7;overflow-x:hidden}
    .btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 32px;background:var(--gold);color:var(--walnut);font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;border:none;cursor:pointer;text-decoration:none;transition:background 0.2s,transform 0.15s}
    .btn-primary:hover{background:#c8a46a;transform:translateY(-1px)}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:96px 24px 48px}
    .card{width:100%;max-width:440px;background:rgba(250,247,242,0.9);border:1px solid var(--border-subtle);backdrop-filter:blur(10px);border-radius:12px;padding:28px 24px;box-shadow:0 20px 60px rgba(58,42,26,0.08)}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px}
    .logo-mark{width:28px;height:28px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center}
    .brand-name{font-family:var(--font-serif);letter-spacing:0.2em;text-transform:uppercase;font-weight:300}
    .title{font-family:var(--font-serif);font-size:36px;font-weight:300;color:var(--walnut);margin-bottom:8px}
    .subtitle{font-size:13px;color:var(--muted);margin-bottom:22px}
    label{display:block;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(58,42,26,0.55);margin-bottom:8px}
    .field{margin-bottom:16px}
    input{width:100%;padding:14px 14px;border:1px solid rgba(58,42,26,0.2);background:white;color:var(--walnut);outline:none;border-radius:8px;font-size:13px;font-family:var(--font-sans)}
    input:focus{border-color:var(--gold)}
    .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .link{font-size:12px;color:var(--gold);text-decoration:none}
    .actions{display:flex;gap:12px;flex-direction:column}
    .small{font-size:12px;color:var(--muted);margin-top:16px}
    .small a{color:var(--gold);text-decoration:none}
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="logo-mark">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="4" height="12" fill="#B8935A" opacity="0.9"/>
            <rect x="7" y="5" width="6" height="8" fill="#B8935A" opacity="0.5"/>
          </svg>
        </div>
        <div class="brand-name">Mộc & Vàng</div>
      </div>

      <div class="title">Đăng nhập</div>
      <div class="subtitle">Chào mừng trở lại. Vui lòng nhập thông tin để tiếp tục.</div>

      <form method="post" action="/login">
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="email@cuaban.com" required />
        </div>

        <div class="field">
          <label>Mật khẩu</label>
          <input type="password" name="password" placeholder="••••••••" required />
        </div>

        <div class="row">
          <div style="font-size:12px;color:var(--muted)"> </div>
          <a class="link" href="#">Quên mật khẩu?</a>
        </div>

        <div class="actions">
          <button class="btn-primary" type="submit">Đăng nhập</button>
        </div>
      </form>

      <div class="small">Chưa có tài khoản? <a href="/register">Đăng ký</a></div>
      <div class="small"><a href="/index">← Quay về trang chủ</a></div>
    </div>
  </div>
</body>
</html>
