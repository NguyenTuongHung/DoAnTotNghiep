<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Trang thông tin</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f2ea; color: #3a2a1a; }
    .wrapper { max-width: 1080px; margin: 0 auto; padding: 40px 24px 80px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 32px; }
    .topbar a { color: #b8935a; text-decoration: none; font-weight: 600; }
    .hero { margin-bottom: 36px; }
    .hero h1 { font-size: clamp(38px, 4vw, 56px); line-height: 1.05; margin-bottom: 16px; }
    .hero p { max-width: 770px; font-size: 16px; line-height: 1.9; color: #5f4f3b; }
    .section { background: white; border-radius: 24px; padding: 32px; margin-bottom: 28px; box-shadow: 0 24px 44px rgba(0,0,0,0.08); }
    .section h2 { font-size: 26px; margin-bottom: 16px; color: #3a2a1a; }
    .section p { color: #5f4f3b; line-height: 1.8; margin-bottom: 16px; }
    .section ul { padding-left: 20px; color: #5f4f3b; line-height: 1.8; }
    .section ul li { margin-bottom: 12px; }
    .callout { padding: 24px; border-radius: 20px; background: #f4eadb; border: 1px solid rgba(184,147,90,0.2); margin-top: 16px; }
    .callout strong { display: block; margin-bottom: 8px; color: #3a2a1a; }
    .button-row { margin-top: 22px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; background: #3a2a1a; color: white; padding: 14px 28px; border-radius: 14px; text-decoration: none; font-weight: 600; transition: background 0.2s, transform 0.2s; }
    .btn:hover { background: #2c1f13; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="topbar">
      <a href="/">← Trở về trang chủ</a>
      <a href="/about">Giới thiệu</a>
    </div>
    <div class="hero">
      <h1 th:text="${pageTitle}">Tiêu đề trang</h1>
      <p th:text="${pageDescription}">Mô tả ngắn về trang.</p>
    </div>

    <div th:each="block : ${pageBlocks}">
      <div class="section">
        <h2 th:text="${block.title}">Tiêu đề</h2>
        <p th:if="${block.text}" th:text="${block.text}">Nội dung chi tiết.</p>
        <ul th:if="${block.items}">
          <li th:each="item : ${block.items}" th:text="${item}">Mục danh sách</li>
        </ul>
      </div>
    </div>

    <div class="section callout">
      <strong>Đã sẵn sàng khám phá?</strong>
      <p>Chúng tôi luôn sẵn sàng tư vấn giải pháp phù hợp cho không gian sống của bạn. Liên hệ ngay để nhận tư vấn miễn phí.</p>
      <div class="button-row"><a class="btn" href="/brand/lien-he">Liên hệ ngay</a></div>
    </div>
  </div>
</body>
</html>
